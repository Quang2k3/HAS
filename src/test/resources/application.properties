# ============================================================
# Hospital Appointment System (HAS) — Test Configuration
# ============================================================

spring.application.name=HAS-Test

# ======================== H2 In-Memory DataSource ========================
spring.datasource.url=jdbc:h2:mem:hospital_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ======================== JPA / Hibernate ========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======================== JWT Configuration ========================
app.jwt.secret=HospitalAppointmentSystemSecretKey2024VeryLongSecretKeyForHS512Algorithm
app.jwt.expiration=3600000

# ======================== Docker Compose ========================
spring.docker.compose.enabled=false
