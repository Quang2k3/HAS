# ============================================================
# Hospital Appointment System (HAS) — Application Properties
# ============================================================

spring.application.name=HAS

# ======================== Server ========================
server.port=8080

# ======================== MySQL DataSource ========================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================== JPA / Hibernate ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ======================== JWT Configuration ========================
app.jwt.secret=HospitalAppointmentSystemSecretKey2024VeryLongSecretKeyForHS512Algorithm
app.jwt.expiration=86400000

# ======================== SpringDoc / Swagger ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ======================== Docker Compose ========================
spring.docker.compose.enabled=false
